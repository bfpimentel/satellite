<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Satellite Server - White Noise Player" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Satellite" />
    <link rel="manifest" href="/static/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/static/satellite.svg" />
    <link rel="apple-touch-icon" href="/static/icon-192x192.png" />
    <title>Satellite Server</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Victor+Mono:wght@400;600;700&display=swap");
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Victor Mono", monospace;
        background: #000;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        gap: 20px;
      }
      h1 {
        margin-bottom: 24px;
        font-size: 24px;
        font-weight: 300;
      }
      .status {
        font-size: 48px;
        font-weight: 700;
        margin-bottom: 24px;
        text-transform: uppercase;
        letter-spacing: 4px;
      }
      .controls {
        display: flex;
        gap: 20px;
        margin-bottom: 18px;
      }
      button {
        background: #fff;
        color: #000;
        border: none;
        padding: 20px 40px;
        font-size: 16px;
        font-weight: 600;
        font-family: "Victor Mono", monospace;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: opacity 0.2s;
      }
      button:hover {
        opacity: 0.8;
      }
      button.paused {
        background: #222;
        color: #fff;
        border: 1px solid #fff;
      }
      button.download {
        background: transparent;
        color: #fff;
        border: 1px solid #fff;
      }
      .panel {
        width: min(720px, 92vw);
        border: 1px solid #fff;
        padding: 16px;
      }
      .panel h2 {
        font-size: 12px;
        letter-spacing: 2px;
        color: #aaa;
        margin-bottom: 10px;
      }
      .satellite-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 0;
        border-top: 1px solid #333;
        font-size: 14px;
      }
      .satellite-row:first-child {
        border-top: none;
      }
      .online {
        color: #8ef7a1;
      }
      .offline {
        color: #ff9b9b;
      }
      button.clear {
        background: transparent;
        color: #ff9b9b;
        border: 1px solid #ff9b9b;
      }
    </style>
  </head>
  <body>
    <h1>Satellite Server</h1>
    <div class="status" id="status">Paused</div>
    <div class="controls">
      <button id="toggleBtn" onclick="toggleStatus()">Play</button>
      <button class="download" onclick="downloadApp()">Download App</button>
    </div>

    <div class="panel">
      <h2>SATELLITES</h2>
      <div id="satellites"></div>
      <button class="clear" onclick="clearSatellites()" style="margin-top: 16px; padding: 12px 24px; font-size: 14px;">Clear Satellites</button>
    </div>

    <script>
      let ws;
      let isBusy = false;

      function setStatus(state) {
        return fetch("/status", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ state: state }),
        }).then((r) => r.json());
      }

      function renderSatellites(items) {
        const root = document.getElementById("satellites");
        if (!Array.isArray(items) || items.length === 0) {
          root.innerHTML =
            '<div class="dim">No satellites registered yet.</div>';
          return;
        }

        root.innerHTML = items
          .map((s) => {
            const statusClass = s.connected ? "online" : "offline";
            const statusText = s.connected ? "connected" : "disconnected";
            return `<div class="satellite-row"><span>${s.name}</span><span class="${statusClass}">${statusText}</span></div>`;
          })
          .join("");
      }

      function render(payload) {
        const state = payload.state || "Unknown";
        document.getElementById("status").textContent = state;
        const btn = document.getElementById("toggleBtn");
        const playing = state === "Playing";
        btn.textContent = playing ? "Pause" : "Play";
        btn.className = playing ? "" : "paused";
        renderSatellites(payload.satellites || []);
      }

      async function toggleStatus() {
        if (isBusy) return;
        isBusy = true;
        try {
          const current = document.getElementById("status").textContent.trim();
          const next = current === "Playing" ? "Paused" : "Playing";
          const data = await setStatus(next);
          render(data);
        } finally {
          isBusy = false;
        }
      }

      function connectWebSocket() {
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        ws = new WebSocket(`${protocol}://${window.location.host}/ws/status`);

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          render(data);
        };

        ws.onclose = () => {
          setTimeout(connectWebSocket, 1500);
        };
      }

      function downloadApp() {
        window.location.href = "/download/apk";
      }

      async function clearSatellites() {
        if (!confirm("Are you sure you want to clear all satellites?")) return;
        try {
          const response = await fetch("/satellites", { method: "DELETE" });
          const data = await response.json();
          console.log("Cleared satellites:", data);
        } catch (e) {
          console.error("Failed to clear satellites:", e);
        }
      }

      setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          return;
        }
        Promise.all([
          fetch("/status").then((r) => r.json()),
          fetch("/satellites").then((r) => r.json()),
        ]).then(([statusData, satellitesData]) => {
          render({
            state: statusData.state,
            satellites: satellitesData.satellites,
          });
        });
      }, 3000);

      connectWebSocket();
      render({ state: "Paused", satellites: [] });

      // Register service worker for PWA support
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/static/sw.js")
          .then(() => console.log("Service Worker registered"))
          .catch((err) => console.error("Service Worker registration failed:", err));
      }
    </script>
  </body>
</html>
