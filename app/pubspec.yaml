name: satellite
description: "Background white noise player controlled by server"
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.0.0
dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.1
  http: ^1.2.2
  audio_service: ^0.18.18
  just_audio: ^0.9.46
  just_audio_background: ^0.0.1-beta.17
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.5
  signals_flutter: ^6.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/white_noise.wav
    - assets/icon.png
  fonts:
    - family: Victor Mono
      fonts:
        - asset: assets/fonts/VictorMono-Regular.ttf
